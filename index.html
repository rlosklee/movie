<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>인생영화 추천기</title>

  <!-- 파비콘(브라우저 탭 아이콘): 팝콘 🍿 -->
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f37f.png">

  <!-- 모바일 브라우저 주소창 색상 (테마 컬러) -->
  <meta name="theme-color" content="#ff5a5f">

  <!-- 오픈 그래프: 카톡·디스코드 등에서 링크 미리보기용 (제목/설명/썸네일)
       GitHub Pages는 iframe이 아니라서, Apps Script 주소와 달리 미리보기가 제대로 뜹니다. -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="인생영화 추천기">
  <meta property="og:description" content="세 가지만 고르면, 오늘의 인생영화를 찾아드려요 🎬">
  <meta property="og:image" content="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f3ac.png">

  <!-- Pretendard 웹폰트 (CDN에서 불러오기) -->
  <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    :root {
      /* ===== 흰색 심플 테마 ===== */
      --bg: #ffffff;       /* 배경 (흰색) */
      --card: #ffffff;     /* 카드 배경 */
      --card2: #f5f6f8;    /* 칩·입력칸 배경 (연한 회색) */
      --line: #e6e8ec;     /* 테두리 */
      --text: #1a1c23;     /* 글자 (진한 회색) */
      --muted: #9aa0ab;    /* 흐린 글자 */
      --accent: #ff5a5f;   /* 강조색 — 버튼·선택 표시 */
      --accent2: #f59e0b;  /* 포인트 — 태그 */
      /* 폰트: Pretendard 우선, 없으면 시스템 폰트 */
      --font: 'Pretendard Variable', Pretendard, -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }   /* 페이지 스크롤을 부드럽게 */
    /* 클릭 가능한 요소는 마우스를 올리면 손가락 모양 커서로 */
    button, .chip, a, label, [role="button"] { cursor: pointer; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 24px 16px 60px;
    }
    button, input { font-family: inherit; }   /* 버튼·입력칸도 같은 폰트로 통일 */

    .wrap { max-width: 640px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 28px; }
    header h1 { font-size: 28px; margin: 0 0 6px; }
    header p { color: var(--muted); margin: 0; font-size: 15px; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      margin-bottom: 18px;
    }
    .q-title { font-size: 17px; font-weight: 700; margin: 0 0 12px; }
    .q-title .num {
      display: inline-block; width: 26px; height: 26px; line-height: 26px;
      text-align: center; background: var(--accent); color: #fff;
      border-radius: 50%; font-size: 14px; margin-right: 8px;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; }
    .chip {
      border: 1px solid var(--line);
      background: var(--card2);
      color: var(--text);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 15px;
      cursor: pointer;
      transition: all .15s;
    }
    .chip:hover { border-color: var(--accent); }
    .chip.on {
      background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700;
    }

    .btn {
      display: block; width: 100%; border: none; cursor: pointer;
      background: var(--accent);
      color: #fff; font-size: 18px; font-weight: 700;
      padding: 16px; border-radius: 14px; margin-top: 8px;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn.ghost {
      background: transparent; border: 1px solid var(--line); color: var(--muted);
      font-size: 15px; font-weight: 500; padding: 12px;
    }

    /* 결과 카드 */
    #result { display: none; }
    .movie-main {
      background: var(--card);
      border: 1px solid var(--accent);
    }
    .poster {
      width: 100%; height: 190px; border-radius: 14px;
      background: linear-gradient(160deg, #9aa0ab, #6b7280);  /* 장르에 따라 JS가 색을 바꿔줍니다 */
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 16px; color: #fff;
      box-shadow: 0 6px 18px rgba(0,0,0,.15);
    }
    .poster-emoji { font-size: 58px; line-height: 1; }
    .poster-name { font-size: 18px; font-weight: 700; text-align: center; padding: 0 12px;
      text-shadow: 0 1px 6px rgba(0,0,0,.35); }

    /* 상단 즐겨찾기 포스터 3개 */
    .fav-wrap { margin-bottom: 22px; }
    .fav-label { font-size: 14px; color: var(--muted); margin: 0 0 10px; text-align: center; }
    .fav-posters { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .poster-card {
      aspect-ratio: 2 / 3; border-radius: 12px; color: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; text-align: center; padding: 8px;
      box-shadow: 0 4px 14px rgba(0,0,0,.14);
      text-decoration: none;                             /* 링크 밑줄 제거 */
      transition: transform .15s ease, box-shadow .15s ease;
    }
    /* 마우스를 올리면 살짝 떠오르고, 누르면 눌리는 효과 */
    .poster-card:hover { transform: translateY(-4px) scale(1.03); box-shadow: 0 10px 22px rgba(0,0,0,.22); }
    .poster-card:active { transform: scale(0.96); }
    .poster-card .pc-emoji { font-size: 34px; line-height: 1; }
    .poster-card .pc-title { font-size: 15px; font-weight: 700; text-shadow: 0 1px 5px rgba(0,0,0,.35); }
    .poster-card .pc-sub { font-size: 11px; opacity: .85; }
    .poster-card.hp      { background: linear-gradient(160deg, #241a3d, #4a2f7a); }
    .poster-card.intern  { background: linear-gradient(160deg, #37506b, #8a7150); }
    .poster-card.titanic { background: linear-gradient(160deg, #0d3b66, #1c6fae); }
    .movie-main h2 { font-size: 26px; margin: 0 0 4px; }
    .meta { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
    .tag {
      display: inline-block; background: var(--card2); border: 1px solid var(--line);
      color: var(--accent2); border-radius: 8px; padding: 3px 10px;
      font-size: 13px; margin: 3px 4px 0 0;
    }
    .review { font-size: 16px; margin: 14px 0 0; }

    .others h3 { font-size: 15px; color: var(--muted); margin: 6px 0 10px; }
    .other-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-top: 1px solid var(--line);
    }
    .other-emoji { font-size: 26px; }
    .other-item b { font-size: 15px; }
    .other-item span { color: var(--muted); font-size: 13px; }

    /* 제출 폼 */
    .submit-box input {
      width: 100%; background: var(--card2); border: 1px solid var(--line);
      color: var(--text); border-radius: 10px; padding: 12px; font-size: 15px;
      margin-bottom: 10px;
    }
    .submit-box input::placeholder { color: var(--muted); }
    .msg { text-align: center; font-size: 14px; color: var(--accent2); min-height: 20px; }
    .loading { text-align: center; color: var(--muted); padding: 20px; display: none; }
    footer { text-align: center; color: var(--muted); font-size: 12px; margin-top: 30px; }
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🎬 인생영화 추천기</h1>
    <p>세 가지만 고르면, 오늘의 인생영화를 찾아드려요</p>
  </header>

  <!-- ===== 상단 즐겨찾기 포스터 3개 ===== -->
  <section class="fav-wrap">
    <p class="fav-label">🎞️ 내가 좋아하는 영화</p>
    <div class="fav-posters">
      <a class="poster-card hp" href="https://www.google.com/search?q=해리포터+영화" target="_blank" rel="noopener">
        <span class="pc-emoji">⚡</span>
        <span class="pc-title">해리 포터</span>
        <span class="pc-sub">판타지</span>
      </a>
      <a class="poster-card intern" href="https://www.google.com/search?q=인턴+영화" target="_blank" rel="noopener">
        <span class="pc-emoji">👔</span>
        <span class="pc-title">인턴</span>
        <span class="pc-sub">드라마</span>
      </a>
      <a class="poster-card titanic" href="https://www.google.com/search?q=타이타닉+영화" target="_blank" rel="noopener">
        <span class="pc-emoji">🚢</span>
        <span class="pc-title">타이타닉</span>
        <span class="pc-sub">로맨스</span>
      </a>
    </div>
  </section>

  <!-- ===== 질문 영역 ===== -->
  <div id="quiz">
    <div class="card">
      <p class="q-title"><span class="num">1</span>어떤 장르가 끌리나요?</p>
      <div class="chips" data-group="장르">
        <div class="chip">로맨스</div>
        <div class="chip">드라마</div>
        <div class="chip">코미디</div>
        <div class="chip">SF·판타지</div>
        <div class="chip">액션·스릴러</div>
        <div class="chip">애니메이션</div>
      </div>
    </div>

    <div class="card">
      <p class="q-title"><span class="num">2</span>지금 어떤 기분을 느끼고 싶나요?</p>
      <div class="chips" data-group="분위기">
        <div class="chip">위로</div>
        <div class="chip">설렘</div>
        <div class="chip">신남</div>
        <div class="chip">뭉클</div>
        <div class="chip">짜릿</div>
      </div>
    </div>

    <div class="card">
      <p class="q-title"><span class="num">3</span>누구와 함께 보나요?</p>
      <div class="chips" data-group="대상">
        <div class="chip">혼자</div>
        <div class="chip">연인</div>
        <div class="chip">친구</div>
        <div class="chip">가족</div>
      </div>
    </div>

    <button class="btn" id="goBtn" disabled>영화 목록을 불러오는 중...</button>
    <p class="msg" id="loadMsg"></p>
  </div>

  <div class="loading" id="loading">🍿 딱 맞는 영화를 고르는 중...</div>

  <!-- ===== 결과 영역 ===== -->
  <div id="result">
    <div class="card movie-main">
      <div class="poster" id="poster">
        <div class="poster-emoji" id="poster-emoji">🎬</div>
        <div class="poster-name" id="poster-name"></div>
      </div>
      <h2 id="m-title"></h2>
      <p class="meta" id="m-meta"></p>
      <div id="m-tags"></div>
      <p class="review" id="m-review"></p>
    </div>

    <div class="card others" id="othersBox">
      <h3>이런 영화도 함께 볼만해요</h3>
      <div id="m-others"></div>
    </div>

    <button class="btn ghost" id="againBtn">다시 추천받기</button>
  </div>

  <!-- ===== 나의 인생영화 제출 ===== -->
  <div class="card submit-box">
    <p class="q-title">✍️ 나의 인생영화 자랑하기</p>
    <input id="s-title" placeholder="영화 제목 (예: 어바웃 타임)">
    <input id="s-review" placeholder="한 줄 감상평">
    <input id="s-nick" placeholder="닉네임 (선택)">
    <button class="btn" id="submitBtn">등록하기</button>
    <p class="msg" id="submitMsg"></p>
  </div>

  <footer>Google Sheets · Apps Script로 만든 나의 첫 웹앱 🚀</footer>
</div>

<script>
  // ============================================================
  //  이 페이지는 GitHub Pages(정적 호스팅)에 올라갑니다.
  //  영화 데이터는 아래 Apps Script 주소에 물어봐서 가져옵니다.
  //  Apps Script를 다시 배포해서 주소가 바뀌면 이 한 줄만 고치세요.
  // ============================================================
  var API주소 = 'https://script.google.com/macros/s/AKfycbyBzFjhzEoU_AN29NAnYjCbMec8W6Goeg7I_l3BA9n0DmDlcSvsB8XwVm0YOVD8S0bH/exec';

  // ------------------------------------------------------------
  //  Apps Script에 요청을 보내는 함수 (JSONP 방식)
  //  github.io 와 script.google.com 은 서로 다른 주소라서
  //  보통의 방법으로는 브라우저 보안(CORS)에 막힙니다.
  //  그래서 <script> 태그로 불러오는 JSONP를 씁니다.
  // ------------------------------------------------------------
  var 콜백번호 = 0;
  function API호출(파라미터, 성공했을때, 실패했을때) {
    var 콜백이름 = '_cb' + (++콜백번호) + '_' + Date.now();
    var script = document.createElement('script');
    var 타이머;

    function 뒷정리() {
      clearTimeout(타이머);
      try { delete window[콜백이름]; } catch (e) { window[콜백이름] = undefined; }
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    // Apps Script가 이 이름의 함수를 불러주면서 결과를 넘겨줍니다.
    window[콜백이름] = function (응답) {
      뒷정리();
      if (응답 && 응답.ok) 성공했을때(응답);
      else 실패했을때(new Error((응답 && 응답.message) || '알 수 없는 오류'));
    };

    var 쿼리 = ['callback=' + 콜백이름];
    for (var 키 in 파라미터) {
      쿼리.push(encodeURIComponent(키) + '=' + encodeURIComponent(파라미터[키]));
    }

    script.onerror = function () { 뒷정리(); 실패했을때(new Error('서버에 연결하지 못했어요.')); };
    타이머 = setTimeout(function () {
      뒷정리(); 실패했을때(new Error('응답이 너무 늦어요. 잠시 후 다시 시도해 주세요.'));
    }, 20000);

    script.src = API주소 + '?' + 쿼리.join('&');
    document.head.appendChild(script);
  }

  // 시트에서 가져온 영화 데이터가 담길 곳 (처음엔 비어 있습니다)
  var 영화데이터 = [];

  // 이모지: 장르에 따라 포스터 자리에 보여줄 그림
  var 이모지표 = {
    '로맨스': '💕', '드라마': '🎭', '코미디': '😆',
    'SF·판타지': '🚀', '액션·스릴러': '💥', '애니메이션': '✨'
  };
  function 이모지고르기(장르) {
    var keys = Object.keys(이모지표);
    for (var i = 0; i < keys.length; i++) {
      if (String(장르).indexOf(keys[i]) > -1) return 이모지표[keys[i]];
    }
    return '🎬';
  }

  // 장르에 따른 포스터 배경 색(그라데이션)
  var 그라데이션표 = {
    '로맨스': 'linear-gradient(160deg, #ff8fab, #c9184a)',
    '드라마': 'linear-gradient(160deg, #6d597a, #355070)',
    '코미디': 'linear-gradient(160deg, #ffb703, #fb8500)',
    'SF·판타지': 'linear-gradient(160deg, #3a0ca3, #4361ee)',
    '액션·스릴러': 'linear-gradient(160deg, #6a040f, #d00000)',
    '애니메이션': 'linear-gradient(160deg, #48cae4, #0077b6)'
  };
  function 그라데이션고르기(장르) {
    var keys = Object.keys(그라데이션표);
    for (var i = 0; i < keys.length; i++) {
      if (String(장르).indexOf(keys[i]) > -1) return 그라데이션표[keys[i]];
    }
    return 'linear-gradient(160deg, #9aa0ab, #6b7280)';
  }

  // 선택한 답을 담아두는 곳
  var answers = { 장르: '', 분위기: '', 대상: '' };

  // 추천받기 버튼은 "영화 데이터도 왔고 + 세 개 다 골랐을 때"만 켜집니다.
  function 버튼상태갱신() {
    var 준비됨 = 영화데이터.length > 0 && answers.장르 && answers.분위기 && answers.대상;
    document.getElementById('goBtn').disabled = !준비됨;
  }

  // ===== 페이지가 열리자마자 시트에서 영화 목록을 가져옵니다 =====
  API호출({ action: 'movies' },
    function (응답) {
      영화데이터 = 응답.movies || [];
      document.getElementById('goBtn').textContent = '인생영화 추천받기';
      document.getElementById('loadMsg').textContent = '';
      버튼상태갱신();
    },
    function (err) {
      document.getElementById('goBtn').textContent = '불러오기 실패';
      document.getElementById('loadMsg').textContent =
        '영화 목록을 가져오지 못했어요 (' + err.message + '). 새로고침해 주세요.';
    }
  );

  // 칩(버튼) 클릭 처리: 같은 그룹에서 하나만 선택되게
  document.querySelectorAll('.chips').forEach(function (group) {
    var 그룹이름 = group.getAttribute('data-group');
    group.querySelectorAll('.chip').forEach(function (chip) {
      chip.addEventListener('click', function () {
        group.querySelectorAll('.chip').forEach(function (c) { c.classList.remove('on'); });
        chip.classList.add('on');
        answers[그룹이름] = chip.textContent;
        버튼상태갱신();
      });
    });
  });

  // 추천 계산 (브라우저 안에서 바로 — 서버를 안 거쳐서 즉시 나옵니다)
  function 추천계산(answers) {
    var scored = 영화데이터.map(function (m) {
      var score = 0;
      var 장르 = String(m['장르'] || '');
      var 분위기 = String(m['분위기'] || '');
      var 대상 = String(m['추천대상'] || '');
      // 답변과 겹치면 점수를 준다 (장르/분위기가 더 중요)
      if (answers.장르   && 장르.indexOf(answers.장르)   > -1) score += 3;
      if (answers.분위기 && 분위기.indexOf(answers.분위기) > -1) score += 3;
      if (answers.대상   && 대상.indexOf(answers.대상)   > -1) score += 2;
      score += Math.random();  // 동점일 때 매번 다른 영화가 나오도록 살짝 섞기
      return { movie: m, score: score };
    });
    scored.sort(function (a, b) { return b.score - a.score; });
    return {
      main: scored[0] ? scored[0].movie : null,
      others: [scored[1], scored[2]]
        .filter(function (x) { return x; })
        .map(function (x) { return x.movie; })
    };
  }

  // 추천받기 버튼
  document.getElementById('goBtn').addEventListener('click', function () {
    document.getElementById('quiz').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    // 짧게 '고르는 중' 애니메이션을 보여준 뒤 바로 결과 표시 (0.6초)
    setTimeout(function () {
      결과그리기(추천계산(answers));
    }, 600);
  });

  // 결과 화면 그리기
  function 결과그리기(res) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('result').style.display = 'block';

    var m = res.main;
    document.getElementById('poster').style.background = 그라데이션고르기(m['장르']);
    document.getElementById('poster-emoji').textContent = 이모지고르기(m['장르']);
    document.getElementById('poster-name').textContent = m['제목'];
    document.getElementById('m-title').textContent = m['제목'];
    document.getElementById('m-meta').textContent =
      (m['감독'] || '') + ' · ' + (m['개봉연도'] || '');

    var 태그들 = String(m['장르'] + ',' + m['분위기']).split(',');
    document.getElementById('m-tags').innerHTML = 태그들.map(function (t) {
      return '<span class="tag">#' + t.trim() + '</span>';
    }).join('');
    document.getElementById('m-review').textContent = '"' + (m['한줄평'] || '') + '"';

    // 함께 볼만한 영화
    var box = document.getElementById('m-others');
    if (res.others && res.others.length) {
      document.getElementById('othersBox').style.display = 'block';
      box.innerHTML = res.others.map(function (o) {
        return '<div class="other-item">' +
                 '<span class="other-emoji">' + 이모지고르기(o['장르']) + '</span>' +
                 '<div><b>' + o['제목'] + '</b><br><span>' + (o['한줄평'] || '') + '</span></div>' +
               '</div>';
      }).join('');
    } else {
      document.getElementById('othersBox').style.display = 'none';
    }
    window.scrollTo(0, 0);
  }

  // 다시하기
  document.getElementById('againBtn').addEventListener('click', function () {
    document.getElementById('result').style.display = 'none';
    document.getElementById('quiz').style.display = 'block';
    window.scrollTo(0, 0);
  });

  // 나의 인생영화 제출 → Apps Script가 '사용자제출' 시트에 저장합니다
  document.getElementById('submitBtn').addEventListener('click', function () {
    var 제목 = document.getElementById('s-title').value.trim();
    if (!제목) { document.getElementById('submitMsg').textContent = '영화 제목을 입력해 주세요.'; return; }

    var btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = '등록 중...';
    document.getElementById('submitMsg').textContent = '';

    API호출({
      action: 'submit',
      title: 제목,
      review: document.getElementById('s-review').value,
      nick: document.getElementById('s-nick').value
    },
    function (응답) {
      document.getElementById('submitMsg').textContent = 응답.message;
      document.getElementById('s-title').value = '';
      document.getElementById('s-review').value = '';
      document.getElementById('s-nick').value = '';
      btn.disabled = false; btn.textContent = '등록하기';
    },
    function (err) {
      document.getElementById('submitMsg').textContent = '오류: ' + err.message;
      btn.disabled = false; btn.textContent = '등록하기';
    });
  });
</script>
</body>
</html>
